name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci --prefix apps/web

      - name: Check API contract snapshot
        run: PYTHONPATH=apps/api/src python apps/api/scripts/check_openapi.py

      - name: Lint backend
        run: python -m ruff check apps/api

      - name: Format check backend
        run: python -m ruff format --check apps/api

      - name: Typecheck backend
        run: python -m mypy apps/api/src

      - name: Test backend
        run: python -m pytest apps/api/tests

      - name: Security scan backend
        run: python -m bandit -q -r apps/api/src

      - name: Dependency audit backend
        run: python -m pip_audit -r apps/api/requirements-dev.txt

      - name: Lint frontend
        run: npm --prefix apps/web run lint

      - name: Typecheck frontend
        run: npm --prefix apps/web run typecheck

      - name: Test frontend
        run: npm --prefix apps/web run test:run

      - name: Dependency audit frontend
        run: npm --prefix apps/web audit --audit-level=high
